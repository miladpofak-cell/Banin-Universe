
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="theme-color"
        content="#02040d">

    <meta
        name="description"
        content="Banin Universe">

    <title>Banin Universe</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===================================== -->
<!-- CINEMATIC LOADING / ENTER SCREEN -->
<!-- ===================================== -->

<div
    id="loadingScreen"
    role="dialog"
    aria-modal="true"
    aria-label="Banin Universe Loading">

    <div class="universe-loader">

        <div
            class="loading-stars"
            aria-hidden="true">

            <span style="--x:8%; --y:18%; --delay:.2s;">✦</span>
            <span style="--x:20%; --y:72%; --delay:1.1s;">✧</span>
            <span style="--x:29%; --y:27%; --delay:1.8s;">✦</span>
            <span style="--x:73%; --y:21%; --delay:.7s;">✧</span>
            <span style="--x:84%; --y:67%; --delay:1.4s;">✦</span>
            <span style="--x:92%; --y:34%; --delay:2.1s;">✧</span>

        </div>

        <div
            class="loading-moon-wrap"
            aria-hidden="true">

            <div class="loading-moon">

                <div class="loading-moon-fill"></div>

                <div class="loading-moon-shine"></div>

            </div>

            <div class="loading-moon-aura"></div>

        </div>

        <h1 class="loading-title">
            Banin Universe
        </h1>

        <p
            id="loadingStatus"
            class="loading-status">

            دارم دنیای کوچیکمون رو روشن می‌کنم...

        </p>

        <div class="loading-progress-track">

            <div
                id="loadingProgressBar"
                class="loading-progress-bar">
            </div>

        </div>

        <div
            id="loadingPercentage"
            class="loading-percentage">

            0%

        </div>

        <button
            id="enterUniverseButton"
            class="enter-universe-button"
            type="button"
            disabled>

            برای ورود کلیک کنید

        </button>

    </div>

</div>

<div id="app">

    <!-- ===================================== -->
    <!-- CAMERA -->
    <!-- ===================================== -->

    <div id="camera">

        <!-- ===================================== -->
        <!-- SKY -->
        <!-- ===================================== -->

        <div id="dreamSky">

            <canvas id="starCanvas"></canvas>

        </div>

        <!-- ===================================== -->
        <!-- BACKGROUND -->
        <!-- ===================================== -->

        <div id="backgroundLayer">

            <img
                id="backgroundImage"
                src="assets/images/background.webp"
                alt="Banin Universe Background"
                draggable="false">

        </div>

        <!-- ===================================== -->
        <!-- MOON -->
        <!-- ===================================== -->

        <div id="moonLayer">

            <div
                id="moon"
                aria-hidden="true">
            </div>

        </div>

        <!-- ===================================== -->
        <!-- WORLD -->
        <!-- ===================================== -->

        <div id="worldLayer">

            <!-- Background Objects -->
            <div id="riverContainer"></div>
            <div id="treeContainer"></div>
            <div id="girlContainer"></div>
            <div id="swingContainer"></div>
            <div id="lanternContainer"></div>

            <!-- Interactive Objects -->
            <div id="baninUniverseLogoContainer"></div>
            <div id="storyBookContainer"></div>
            <div id="diaryContainer"></div>
            <div id="galleryContainer"></div>
            <div id="giftContainer"></div>
            <div id="musicContainer"></div>

        </div>

        <!-- ===================================== -->
        <!-- PARTICLES -->
        <!-- ===================================== -->

        <div id="particleLayer">

            <div id="mistLayer"></div>
            <div id="fireflyLayer"></div>
            <div id="petalLayer"></div>
            <div id="butterflyLayer"></div>
            <div id="magicDustLayer"></div>

        </div>

        <!-- ===================================== -->
        <!-- LIGHT -->
        <!-- ===================================== -->

        <div id="lightLayer">

            <div id="moonGlow"></div>
            <div id="lanternGlow"></div>
            <div id="ambientLight"></div>

        </div>

        <!-- ===================================== -->
        <!-- UI -->
        <!-- ===================================== -->

        <div id="uiLayer">

            <div id="logoContainer"></div>

            <div id="miladSignatureContainer"></div>

            <nav id="mainMenu">

                <button id="btnStory">
                    Our Story
                </button>

                <button id="btnGallery">
                    Gallery
                </button>

                <button id="btnDiary">
                    Diary
                </button>

                <button id="btnGift">
                    Gifts
                </button>

                <button id="btnMusic">
                    Music Story
                </button>

                <button id="btnSettings">
                    Settings
                </button>

            </nav>

        </div>

        <!-- ===================================== -->
        <!-- MODALS -->
        <!-- ===================================== -->

        <div id="modalLayer">

            <!-- GALLERY LOCK -->
            <div
                id="galleryLockModal"
                class="hidden">

                <div class="lockBox">

                    <h2>
                        🔐 Gallery Locked
                    </h2>

                    <input
                        id="galleryPassword"
                        type="password"
                        placeholder="Password"
                        autocomplete="off">

                    <button
                        id="unlockGalleryBtn"
                        type="button">

                        Unlock

                    </button>

                    <div id="lockError"></div>

                </div>

            </div>

            <!-- OLD GALLERY GRID -->
            <div
                id="galleryGrid"
                class="hidden">
            </div>

            <!-- OLD GALLERY VIEWER -->
            <div
                id="galleryViewer"
                class="hidden">

                <button
                    id="closeViewer"
                    type="button">

                    ✕

                </button>

                <img
                    id="viewerImage"
                    src=""
                    alt="Gallery Image"
                    draggable="false">

            </div>

        </div>

        <!-- ===================================== -->
        <!-- AUDIO -->
        <!-- ===================================== -->

        <audio
            id="bgMusic"
            loop
            preload="auto">

            <source
                src="assets/audio/music.mp3"
                type="audio/mpeg">

        </audio>

    </div>

</div>

<!-- ===================================== -->
<!-- CORE -->
<!-- ===================================== -->

<script src="js/engine.js"></script>

<!-- ===================================== -->
<!-- WORLD OBJECTS -->
<!-- ===================================== -->

<script src="js/world/world-config.js"></script>

<script src="js/world/banin-universe-logo.js"></script>

<script src="js/world/milad-signature.js"></script>

<script src="js/world/moon.js"></script>

<script src="js/world/tree.js"></script>

<script src="js/world/swing.js"></script>

<script src="js/world/lantern.js"></script>

<script src="js/world/girl.js"></script>

<script src="js/world/story-book.js"></script>

<script src="js/world/diary-object.js"></script>

<!-- Gallery Lock must load before Gallery Object -->
<script src="js/world/gallery-crypto.js"></script>
<script src="js/world/gallery-encrypted-data.js"></script>
<script src="js/world/gallery-lock.js"></script>

<script src="js/world/gallery-object.js"></script>

<script src="js/world/gallery-data.js"></script>

<script src="js/world/gallery-panel.js"></script>

<script src="js/world/gift-object.js"></script>

<script src="js/world/music-object.js"></script>

<script src="js/world/music-player-panel.js"></script>

<!-- ===================================== -->
<!-- STORY BOOK SYSTEM -->
<!-- ===================================== -->

<script src="js/story/story-pages.js"></script>

<script src="js/story/story-system.js"></script>

<!-- ===================================== -->
<!-- WORLD LOADER -->
<!-- ===================================== -->

<script src="js/world/world-interactions.js"></script>

<script src="js/world/world-loader.js"></script>

<script src="js/world.js"></script>

<script src="js/particles.js"></script>

<!-- ===================================== -->
<!-- DIARY -->
<!-- ===================================== -->

<script src="js/diary/diary-data.js"></script>

<script src="js/diary/diary.js"></script>

<!-- ===================================== -->
<!-- GIFTS -->
<!-- ===================================== -->

<script src="js/gifts/gifts.js"></script>

<!-- ===================================== -->
<!-- MUSIC -->
<!-- ===================================== -->

<script src="js/music/music.js"></script>

<!-- ===================================== -->
<!-- SAVE -->
<!-- ===================================== -->

<script src="js/save/save.js"></script>

<!-- ===================================== -->
<!-- LOADING / ENTRY -->
<!-- ===================================== -->

<script src="js/loading-screen.js"></script>

<!-- ===================================== -->
<!-- MAIN -->
<!-- ===================================== -->

<script src="js/main.js"></script>

</body>

</html>
